name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Hourly self-heal — if a push deploy gets blocked by Hostinger's IP
  # reputation WAF (port 65002 timeout from flagged Azure runner IP), the
  # next cron tick draws a different runner IP and retries. Same pattern
  # as kinetic-gain-suite-landing.
  schedule:
    - cron: '37 * * * *'  # off the top of the hour to avoid GH cron herd

permissions:
  contents: read

concurrency:
  group: pulse-landing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: SFTP-sync static site to pulse.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify site root contains AI Procurement Pulse landing
        run: |
          test -f index.html || (echo "FAIL: no index.html at repo root" && exit 1)
          grep -q "AI Procurement Pulse" index.html || (echo "FAIL: index.html does not mention AI Procurement Pulse" && exit 1)
          echo "OK: site root verified"
          ls -lah

      - name: Install SSH key + add known_host
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/kg_deploy
          chmod 600 ~/.ssh/kg_deploy
          HOST="${FTP_HOST#ftp://}"; HOST="${HOST#sftp://}"; HOST="${HOST%/}"
          ssh-keyscan -p 65002 -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SFTP-Deploy via tar | ssh
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
        run: |
          set -euo pipefail
          HOST="${FTP_HOST#ftp://}"; HOST="${HOST#sftp://}"; HOST="${HOST%/}"
          tar --exclude='.git' --exclude='.github' --exclude='node_modules' \
              --exclude='CHANGELOG.md' --exclude='LICENSE' --exclude='README.md' \
              --exclude='docs' --exclude='.DS_Store' --exclude='.gitignore' \
              --exclude='.claude' -czf - . | \
          ssh -i ~/.ssh/kg_deploy -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 -o ServerAliveInterval=15 -p 65002 \
              "$FTP_USER@$HOST" \
              'cd domains/kineticgain.com/public_html/pulse/ && tar -xzf - && echo DEPLOY_EXTRACTED'

      - name: Post-deploy verification
        run: |
          sleep 5
          status=$(curl -sIo /dev/null -w "%{http_code}" "https://pulse.kineticgain.com/")
          if [ "$status" = "200" ]; then
            echo "OK: https://pulse.kineticgain.com/ -> 200"
          else
            echo "FAIL: https://pulse.kineticgain.com/ -> $status"
            exit 1
          fi
